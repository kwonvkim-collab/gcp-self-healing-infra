name: terraform-validate

on:
  pull_request:
    branches:
      - main
      - 'docs/**'
      - 'phase-**'
    paths:
      - 'terraform/**'
      - 'scripts/**'
      - '.github/workflows/terraform.yml'

jobs:
  terraform:
    name: Terraform validate & fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -backend=false — no real GCS bucket needed for validation
      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      # Fails if any .tf file is not formatted
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        # SC2154 suppressed: startup.sh is a Terraform templatefile and the
        # ${db_host}/${db_user} refs are Terraform interpolations, not shell
        # variables. SC2086 suppressed for gcloud retry patterns.
        run: shellcheck --severity=warning --exclude=SC2154,SC2086 scripts/*.sh

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: tflint --init
        run: tflint --init
        working-directory: ./terraform
      - name: tflint
        # --recursive walks every module dir. --minimum-failure-severity=warning
        # means warnings still block the PR, matching the rest of the CI.
        run: tflint --recursive --minimum-failure-severity=warning

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        # tfsec scans Terraform for security misconfigurations (open ports,
        # plaintext secrets, missing encryption, public buckets, etc.). The
        # action exits non-zero on any HIGH/CRITICAL finding. soft_fail=false
        # to keep the gate strict; if a finding is intentional, suppress
        # inline with `tfsec:ignore:<rule_id>` and a comment explaining why.
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        # Checkov is an additional policy scanner — overlap with tfsec is
        # intentional (defence in depth, different rule sets). Quiet mode
        # to keep the log readable; failures still surface in the action
        # summary.
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          output_format: cli
          # Skip CKV_GCP_82 (boot disk encryption KMS) — Free Tier project
          # uses Google-managed encryption only; CKV_GCP_38 same reason.
          skip_check: CKV_GCP_82,CKV_GCP_38

  trivy-images:
    name: trivy (pinned images)
    runs-on: ubuntu-latest
    # Container-image vuln scan: matches the digest pinning in
    # terraform/variables.tf against Trivy's vulnerability database.
    # Gates HIGH and CRITICAL severities; MEDIUM/LOW are reported but
    # do not fail the PR so the signal-to-noise stays high. Runs on every
    # PR that touches variables.tf (where the digest lives) or this
    # workflow itself, plus every PR by default so unrelated PRs still
    # see an up-to-date vulnerability picture without waiting for a
    # digest bump.
    steps:
      - uses: actions/checkout@v4

      - name: Extract pinned image refs from variables.tf
        id: images
        run: |
          set -euo pipefail
          n8n=$(grep -oE 'docker\.n8n\.io/n8nio/n8n:[^"]+"' terraform/variables.tf | tr -d '"' | head -n1)
          cf=$(grep -oE 'cloudflare/cloudflared:[^"]+"' terraform/variables.tf | tr -d '"' | head -n1)
          echo "n8n=$n8n" >> "$GITHUB_OUTPUT"
          echo "cloudflared=$cf" >> "$GITHUB_OUTPUT"
          echo "resolved: n8n=$n8n"
          echo "resolved: cloudflared=$cf"

      - name: Trivy — n8n image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.images.outputs.n8n }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy — cloudflared image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.images.outputs.cloudflared }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
