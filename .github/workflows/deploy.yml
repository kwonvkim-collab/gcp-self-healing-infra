name: Deploy n8n Infrastructure

on:
  push:
    branches: [ main ]

# КРИТИЧЕСКИЙ ФИКС: Ограничение параллельных запусков
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  terraform:
    runs-on: ubuntu-latest
    # GitHub Environment "production" is the deploy approval gate. Configure
    # it under Settings → Environments → production with at least one
    # required reviewer (and ideally a wait timer + branch restriction to
    # `main`). All `terraform apply` runs go through this human approval.
    environment: production
    defaults:
      run:
        working-directory: ./terraform # Все команды будут выполняться здесь

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
          
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_CF_TUNNEL_TOKEN: ${{ secrets.TF_VAR_CF_TUNNEL_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_n8n_encryption_key: ${{ secrets.TF_VAR_n8n_encryption_key }}
          TF_VAR_backup_bucket_name: ${{ vars.BACKUP_BUCKET_NAME }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_db_host: ${{ vars.TF_VAR_db_host }}
          TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
          TF_VAR_n8n_public_host: ${{ vars.TF_VAR_n8n_public_host }}
          TF_VAR_oncall_email: ${{ vars.TF_VAR_oncall_email }}
          # Phase 4 resilience: google_billing_budget requires a billing
          # account ID. Stored as a repository/env secret rather than a var
          # because the ID is account-level metadata, not per-environment
          # config — and some orgs treat it as confidential.
          TF_VAR_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
          # Optional — if set, enables Slack notification channel in addition
          # to email. If unset, only email fires. See monitoring.tf for the
          # conditional wiring. The `||` fallback keeps Terraform's own
          # `default = "#n8n-ops"` semantics intact: when the GitHub
          # variable is undefined, `vars.TF_VAR_slack_channel` evaluates to
          # an empty string (falsy in GH Actions expressions), and the
          # literal default kicks in instead of being overwritten by "".
          TF_VAR_slack_auth_token: ${{ secrets.SLACK_BOT_TOKEN }}
          TF_VAR_slack_channel: ${{ vars.TF_VAR_slack_channel || '#n8n-ops' }}
          # WIF attribute-condition pinning + runbook URL rendering both
          # reference this repo's GitHub identity. Derived from the
          # workflow's own `github.repository` context so forks inherit
          # the correct values automatically without per-fork config.
          TF_VAR_wif_allowed_repository: ${{ github.repository }}
          TF_VAR_github_repository_url: ${{ github.server_url }}/${{ github.repository }}
          # Telegram alerts (Phase 5). Bot token is a secret; chat_id and
          # thread_id are non-sensitive config vars. When TELEGRAM_BOT_TOKEN
          # is empty (default), the entire Telegram chain is skipped.
          TF_VAR_telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TF_VAR_telegram_chat_id: ${{ vars.TELEGRAM_CHAT_ID }}
          TF_VAR_telegram_thread_id: ${{ vars.TELEGRAM_THREAD_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        continue-on-error: false
        env:
          TF_VAR_CF_TUNNEL_TOKEN: ${{ secrets.TF_VAR_CF_TUNNEL_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_n8n_encryption_key: ${{ secrets.TF_VAR_n8n_encryption_key }}
          TF_VAR_backup_bucket_name: ${{ vars.BACKUP_BUCKET_NAME }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_db_host: ${{ vars.TF_VAR_db_host }}
          TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
          TF_VAR_n8n_public_host: ${{ vars.TF_VAR_n8n_public_host }}
          TF_VAR_oncall_email: ${{ vars.TF_VAR_oncall_email }}
          TF_VAR_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
          TF_VAR_slack_auth_token: ${{ secrets.SLACK_BOT_TOKEN }}
          TF_VAR_slack_channel: ${{ vars.TF_VAR_slack_channel || '#n8n-ops' }}
          TF_VAR_wif_allowed_repository: ${{ github.repository }}
          TF_VAR_github_repository_url: ${{ github.server_url }}/${{ github.repository }}
          TF_VAR_telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TF_VAR_telegram_chat_id: ${{ vars.TELEGRAM_CHAT_ID }}
          TF_VAR_telegram_thread_id: ${{ vars.TELEGRAM_THREAD_ID }}

      # Read image references from Terraform state so the mirror step
      # pulls the exact digest-pinned image that Terraform configured.
      - name: Get image references from Terraform
        id: images
        working-directory: ./terraform
        run: |
          echo "n8n_src=$(terraform output -raw n8n_image_source)" >> "$GITHUB_OUTPUT"
          echo "cf_src=$(terraform output -raw cloudflared_image_source)" >> "$GITHUB_OUTPUT"
          echo "n8n_ar=$(terraform output -raw n8n_ar_image)" >> "$GITHUB_OUTPUT"
          echo "cf_ar=$(terraform output -raw cloudflared_ar_image)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repository)" >> "$GITHUB_OUTPUT"

      # Mirror public Docker images into Artifact Registry so that
      # subsequent VM boots pull from the same GCP region (fast + no
      # Docker Hub rate-limits).  Runs after apply so the AR repo exists.
      # continue-on-error: VM falls back to public if AR is empty.
      - name: Mirror images to Artifact Registry
        id: mirror
        continue-on-error: true
        working-directory: .
        run: |
          set -eo pipefail
          REGION="${{ vars.TF_VAR_region || 'us-central1' }}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

          for PAIR in "${{ steps.images.outputs.n8n_src }} ${{ steps.images.outputs.n8n_ar }}" \
                      "${{ steps.images.outputs.cf_src }} ${{ steps.images.outputs.cf_ar }}"; do
            SRC="${PAIR%% *}"
            DST="${PAIR#* }"
            echo ">>> Mirroring ${SRC} → ${DST}"
            docker pull "${SRC}"
            docker tag  "${SRC}" "${DST}"
            docker push "${DST}"
            # Log AR digest for audit trail
            AR_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${DST}" 2>/dev/null || echo "unknown")
            echo "    AR digest: ${AR_DIGEST}"
          done

      - name: Warn on mirror failure
        if: steps.mirror.outcome == 'failure'
        run: |
          echo "::warning::Artifact Registry mirror failed. VMs will fall back to public registries (slower boots, Docker Hub rate limits apply)."
